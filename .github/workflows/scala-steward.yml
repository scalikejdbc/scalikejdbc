name: scala-steward
on:
  push:
    branches: [ master ]
  schedule:
  - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'scalikejdbc' }}
    timeout-minutes: 10
    steps:
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: 89631
        private-key: ${{ secrets.SCALIKEJDBC_BOT_KEY }}
    - name: Launch Scala Steward
      uses: scala-steward-org/scala-steward-action@ff09222640622d474d0d9f93c04aefedd125b187 # v2.92.0
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        author-email: "74833019+scalikejdbc-bot[bot]@users.noreply.github.com"
        author-name: scalikejdbc-bot[bot]
        branches: "master,4.3.x"
