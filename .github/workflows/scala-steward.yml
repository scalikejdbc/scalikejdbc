name: scala-steward
on:
  push:
    branches: [ master ]
  schedule:
  - cron: '0 5 * * *'
  workflow_dispatch:
jobs:
  scala-steward:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'scalikejdbc' }}
    timeout-minutes: 10
    steps:
    - name: Generate token
      id: generate_token
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
      with:
        client-id: 89631
        private-key: ${{ secrets.SCALIKEJDBC_BOT_KEY }}
    - name: Launch Scala Steward
      uses: scala-steward-org/scala-steward-action@026472ebc0e1f80577b240b249e3dc1494e7041b # v2.86.0
      with:
        github-token: ${{ steps.generate_token.outputs.token }}
        author-email: "74833019+scalikejdbc-bot[bot]@users.noreply.github.com"
        author-name: scalikejdbc-bot[bot]
        branches: "master,4.3.x"
