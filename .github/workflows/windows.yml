name: Windows
on:
  pull_request:
  push:
  schedule:
  - cron: '0 18 * * 6'
jobs:
  test:
    timeout-minutes: 30
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: coursier/cache-action@v8
    - uses: sbt/setup-sbt@v1
    - run: rm project/sbt-pgp.sbt
    - shell: bash
      run: sbt -v test
